spring.application.name=register
server.port=${PORT:8081}

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/attendify}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:040678}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false


spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

spring.web.resources.add-mappings=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

app.jwt.secret=${JWT_SECRET:V3N5aW5WbVJzM2Q4eWQ5d0oyMmZwQ3F1U29KaHhlQW50QjQ5NWFxb1BuSA==}
app.jwt.expiration-ms=86400000

logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.com.example.attendance_Backend=INFO
logging.level.org.hibernate.SQL_SLOW=INFO

# Spring Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

server.error.include-message=always

# Performance
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
spring.web.resources.cache.cachecontrol.max-age=365d
spring.web.resources.cache.cachecontrol.cache-public=true
app.request-log.slow-threshold-ms=800
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=200
server.tomcat.mbeanregistry.enabled=true
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,caches
management.endpoint.health.show-details=never
management.metrics.tags.application=${spring.application.name}

# Mock seeding (keep disabled outside explicit load tests)
app.mock-seeder.enabled=false

