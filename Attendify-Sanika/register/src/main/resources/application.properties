# Shared Configuration
spring.application.name=register
server.port=${PORT:8081}

# Active Profile (defaults to dev for local MySQL)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Common JWT Settings
app.jwt.secret=${JWT_SECRET:V3N5aW5WbVJzM2Q4eWQ5d0oyMmZwQ3F1U29KaHhlQW50QjQ5NWFxb1BuSA==}
app.jwt.expiration-ms=86400000

# Common Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Common UI/Servlet Settings
spring.servlet.multipart.enabled=true
spring.web.resources.add-mappings=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.error.include-message=always

# Logging
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.com.example.attendance_Backend=INFO

# Feature Flags
app.mock-seeder.enabled=false
